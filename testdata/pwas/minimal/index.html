<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal PWA</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p  { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Minimal PWA</h1>
    <p>Wrapped with goapk</p>
  </div>
  <script>
    if (window.NativeBridge) {
      console.log('Platform:', window.NativeBridge.getPlatform());
    }
  </script>
</body>
</html>
